<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OpenRD Web Client — v0 scaffolding</title>
<style>
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: #111;
    color: #ddd;
    padding: 1.5rem;
    margin: 0;
  }
  h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
  p  { color: #888; font-size: 0.9rem; line-height: 1.5; }
  #log {
    white-space: pre-wrap;
    background: #000;
    padding: 0.75rem;
    border: 1px solid #222;
    height: 55vh;
    overflow: auto;
    font-size: 0.85rem;
  }
  .row { display: flex; gap: 0.5rem; align-items: center; margin: 0.75rem 0; }
  button {
    padding: 0.4rem 0.9rem;
    background: #1d3a5f;
    color: #ddd;
    border: 1px solid #2a5180;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #244a78; }
  input {
    padding: 0.4rem 0.6rem;
    background: #000;
    color: #ddd;
    border: 1px solid #333;
    border-radius: 3px;
    font-family: inherit;
    flex: 1;
  }
</style>
</head>
<body>
<h1>OpenRD Web Client &mdash; v0 scaffolding</h1>
<p>
  Connects via WebTransport, opens the Control bidirectional stream,
  sends a stub <code>ClientHello</code> frame, and logs what the server
  sends back. No video, no input forwarding, no auth yet &mdash; this just
  exercises the transport path end-to-end.
</p>
<div class="row">
  <input id="url" value="https://localhost:4443/openrd" />
  <button id="go">Connect</button>
</div>
<div id="log"></div>
<script src="./client.js" type="module"></script>
</body>
</html>
